<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>run</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
    }
    #header {
      padding: 6px 12px;
      background: #111;
      color: #888;
      font: 12px/1.5 monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    #header a, #restart-btn { color: #555; text-decoration: none; background: none; border: none; font: 12px/1.5 monospace; cursor: pointer; padding: 0; }
    #header a:hover, #restart-btn:hover { color: #888; }
    #usage { color: #555; margin-right: 12px; }
    #tabbar {
      background: #111;
      border-bottom: 1px solid #333;
      display: flex;
      flex-shrink: 0;
    }
    .tab-btn {
      background: none;
      border: none;
      border-right: 1px solid #333;
      color: #555;
      cursor: pointer;
      font: 12px/1.5 monospace;
      padding: 4px 14px;
    }
    .tab-btn:hover { color: #888; }
    .tab-btn.active { color: #d4d4d4; background: #1a1a1a; }
    #terminal-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .tab-pane {
      position: absolute;
      inset: 0;
      padding: 4px;
      display: none;
    }
    .tab-pane.active { display: block; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }
    #status {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #666;
      font: 14px monospace;
    }
  </style>
</head>
<body>
  <div id="header">
    <span>run.pmh.codes</span>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="usage"></span>
      <button id="restart-btn">restart</button>
      <a href="/auth/logout">logout</a>
    </div>
  </div>
  <div id="tabbar">
    <button class="tab-btn active" data-tab="0">1</button>
    <button class="tab-btn" data-tab="1">2</button>
    <button class="tab-btn" data-tab="2">3</button>
    <button class="tab-btn" data-tab="3">4</button>
    <button class="tab-btn" data-tab="4">5</button>
    <button class="tab-btn" data-tab="5">6</button>
  </div>
  <div id="terminal-wrapper">
    <div id="tab-0" class="tab-pane active"><div id="status">connecting...</div></div>
    <div id="tab-1" class="tab-pane"></div>
    <div id="tab-2" class="tab-pane"></div>
    <div id="tab-3" class="tab-pane"></div>
    <div id="tab-4" class="tab-pane"></div>
    <div id="tab-5" class="tab-pane"></div>
  </div>
  <div style="height:16px;flex-shrink:0;"></div>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="/static/main.js"></script>
</body>
</html>
