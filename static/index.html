  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      font: 13px/1.5 'JetBrains Mono', 'Fira Code', monospace;
      color: #c8c8c8;
    }

    /* ── Header ─────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 40px;
      background: #141414;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    #logo {
      color: #e8e8e8;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      user-select: none;
    }

    #header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #usage {
      font-size: 12px;
      color: #666;
      min-width: 160px;
      text-align: right;
    }

    .btn {
      padding: 4px 12px;
      border: 1px solid #333;
      border-radius: 4px;
      background: transparent;
      color: #999;
      cursor: pointer;
      font: 12px/1.5 inherit;
      text-decoration: none;
      display: inline-block;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn:hover { border-color: #666; color: #e8e8e8; }
    #restart-btn:hover { border-color: #f48771; color: #f48771; }
    #restart-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-logout:hover { border-color: #89d185; color: #89d185; }

    /* ── Tab bar ─────────────────────────────────────── */
    #tabbar {
      display: flex;
      align-items: flex-end;
      padding: 0 12px;
      gap: 2px;
      background: #141414;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
      height: 34px;
    }

    .tab-btn {
      padding: 6px 18px;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      background: transparent;
      color: #555;
      cursor: pointer;
      font: 12px/1.5 inherit;
      transition: color 0.15s, background 0.15s;
      position: relative;
      bottom: -1px;
    }
    .tab-btn:hover { color: #aaa; background: #1a1a1a; }
    .tab-btn.active {
      color: #e8e8e8;
      background: #0d0d0d;
      border-color: #2a2a2a;
      border-bottom-color: #0d0d0d;
    }

    /* ── Terminal area ───────────────────────────────── */
    #terminal-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .tab-pane {
      position: absolute;
      inset: 0;
      padding: 6px;
      display: none;
    }
    .tab-pane.active { display: block; }

    /* ── Status overlay ──────────────────────────────── */
    #status {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #555;
      font-size: 13px;
    }

    /* ── Scrollbar ───────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
  </style>
</head>
<body>
  <div id="header">
    <span id="logo">run.pmh.codes</span>
    <div id="header-right">
      <span id="usage"></span>
      <button id="restart-btn" class="btn">restart</button>
      <a href="/auth/logout" class="btn btn-logout">logout</a>
    </div>
  </div>

  <div id="tabbar">
    <button class="tab-btn active" data-tab="0">1</button>
    <button class="tab-btn" data-tab="1">2</button>
    <button class="tab-btn" data-tab="2">3</button>
    <button class="tab-btn" data-tab="3">4</button>
    <button class="tab-btn" data-tab="4">5</button>
    <button class="tab-btn" data-tab="5">6</button>
  </div>

  <div id="terminal-wrapper">
    <div id="tab-0" class="tab-pane active"><div id="status">connecting...</div></div>
    <div id="tab-1" class="tab-pane"></div>
    <div id="tab-2" class="tab-pane"></div>
    <div id="tab-3" class="tab-pane"></div>
    <div id="tab-4" class="tab-pane"></div>
    <div id="tab-5" class="tab-pane"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="/static/main.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
