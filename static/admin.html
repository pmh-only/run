<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>admin — run.pmh.codes</title>
  <meta name="description" content="Admin dashboard for run.pmh.codes — view all user pods, sessions, and resource utilization.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://run.pmh.codes/admin">

  <!-- Favicon (Twemoji 🖥️) -->
  <link rel="icon" type="image/svg+xml" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f5a5.svg">
  <link rel="alternate icon" type="image/png" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f5a5.png">
  <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f5a5.png">
  <meta name="theme-color" content="#141414">

  <!-- OpenGraph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="run.pmh.codes">
  <meta property="og:url" content="https://run.pmh.codes/admin">
  <meta property="og:title" content="admin — run.pmh.codes">
  <meta property="og:description" content="Admin dashboard for run.pmh.codes — view all user pods, sessions, and resource utilization.">
  <meta property="og:image" content="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f5a5.png">
  <meta property="og:image:alt" content="Desktop computer emoji">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="admin — run.pmh.codes">
  <meta name="twitter:description" content="Admin dashboard for run.pmh.codes — view all user pods, sessions, and resource utilization.">
  <meta name="twitter:image" content="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f5a5.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #0d0d0d;
      font: 13px/1.5 'JetBrains Mono', 'Fira Code', monospace;
      color: #c8c8c8;
    }

    /* ── Header ─────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 40px;
      background: #141414;
      border-bottom: 1px solid #2a2a2a;
    }

    #logo { color: #e8e8e8; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; user-select: none; }
    #logo span { color: #555; font-weight: 400; }

    #header-right { display: flex; align-items: center; gap: 10px; }

    #last-updated { font-size: 12px; color: #444; }

    .btn {
      padding: 4px 12px;
      border: 1px solid #333;
      border-radius: 4px;
      background: transparent;
      color: #999;
      cursor: pointer;
      font: 12px/1.5 inherit;
      text-decoration: none;
      display: inline-block;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn:hover { border-color: #666; color: #e8e8e8; }

    /* ── Content ─────────────────────────────────────── */
    #content { padding: 24px; overflow-y: auto; }

    #summary {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }

    .stat {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 12px 20px;
      min-width: 120px;
    }
    .stat-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-value { font-size: 22px; color: #e8e8e8; margin-top: 2px; }

    /* ── Table ───────────────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    thead th {
      text-align: left;
      padding: 8px 12px;
      color: #555;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 11px;
      border-bottom: 1px solid #2a2a2a;
      user-select: none;
      cursor: pointer;
      white-space: nowrap;
    }
    thead th:hover { color: #999; }
    thead th.sort-asc::after  { content: ' ↑'; color: #6796e6; }
    thead th.sort-desc::after { content: ' ↓'; color: #6796e6; }

    tbody tr { border-bottom: 1px solid #1a1a1a; transition: background 0.1s; }
    tbody tr:hover { background: #141414; }
    tbody td { padding: 9px 12px; vertical-align: middle; }

    .username { color: #e8e8e8; }

    .phase {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
    }
    .phase-running  { background: #1a3a1a; color: #89d185; border: 1px solid #2a5a2a; }
    .phase-pending  { background: #3a3000; color: #cca700; border: 1px solid #5a4800; }
    .phase-failed   { background: #3a1a1a; color: #f48771; border: 1px solid #5a2a2a; }
    .phase-unknown  { background: #222;    color: #666;    border: 1px solid #333; }

    .bar-cell { min-width: 140px; }
    .bar-wrap { display: flex; align-items: center; gap: 8px; }
    .bar-bg {
      flex: 1;
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .bar-label { width: 40px; text-align: right; color: #666; }

    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .dot-on  { background: #89d185; box-shadow: 0 0 4px #89d18566; }
    .dot-off { background: #333; }

    .age { color: #555; }

    .empty { text-align: center; padding: 48px; color: #444; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="header">
    <span id="logo">run.pmh.codes <span>/ admin</span></span>
    <div id="header-right">
      <span id="last-updated"></span>
      <a href="/" class="btn">terminal</a>
      <a href="/auth/logout" class="btn">logout</a>
    </div>
  </div>

  <div id="content">
    <div id="summary">
      <div class="stat">
        <div class="stat-label">total pods</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">running</div>
        <div class="stat-value" id="stat-running">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">connected</div>
        <div class="stat-value" id="stat-connected">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">avg cpu</div>
        <div class="stat-value" id="stat-cpu">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">avg mem</div>
        <div class="stat-value" id="stat-mem">—</div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th data-col="username">user</th>
          <th data-col="pod_phase">status</th>
          <th data-col="connected">session</th>
          <th data-col="cpu_percent" class="bar-cell">cpu</th>
          <th data-col="memory_percent" class="bar-cell">memory</th>
          <th data-col="pod_age_seconds">age</th>
          <th data-col="pod_name">pod</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script src="/static/admin.js"></script>
</body>
</html>
