name: Build ubuntu-systemd base image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile.ubuntu-systemd

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ubuntu-systemd
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/pmh-only/ubuntu-systemd,push-by-digest=true,name-canonical=true,push=true

      - name: Save digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
          echo "Saved digest: $digest"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Download all digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        run: |
          cd /tmp/digests
          digests=$(ls | sed 's|^|ghcr.io/pmh-only/ubuntu-systemd@sha256:|' | tr '\n' ' ')
          docker buildx imagetools create -t ghcr.io/pmh-only/ubuntu-systemd:22.04 $digests
          docker buildx imagetools inspect ghcr.io/pmh-only/ubuntu-systemd:22.04
